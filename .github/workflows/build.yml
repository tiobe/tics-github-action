name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency: build.yml

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, 'Build dist after push to main'))
    steps:
      - name: Setup git config
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.TIOBE_TOKEN }}
      - name: Build
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: |
          npm ci
          npm run package
      - name: Import GPG key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Build dist after push to main
          file_pattern: dist/**
          commit_author: "${{ steps.import-gpg.outputs.name }} <${{ steps.import-gpg.outputs.email }}>"
          commit_user_name: ${{ steps.import-gpg.outputs.name }}
          commit_user_email: ${{ steps.import-gpg.outputs.email }}
